<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>TraceGuard | 智能安全审计中心 Pro (Academic Edition)</title>
    <!-- 引入 Bootstrap 5 及图标 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        /* 学术级紫色调色板配置 */
        :root {
            --primary-purple: #6366f1;
            --deep-purple: #1e1b4b;
            --lavender-bg: #f8faff;
            --accent-purple: #8b5cf6;
            --sidebar-grad: linear-gradient(180deg, #2e1065 0%, #1e1b4b 100%);
        }

        body { background-color: var(--lavender-bg); font-family: 'Inter', 'Segoe UI', system-ui; color: #1e293b; overflow-x: hidden; }

        /* 侧边栏样式升级 */
        #sidebar {
            width: 260px; height: 100vh; position: fixed;
            background: var(--sidebar-grad); color: white; padding-top: 30px; z-index: 1000;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        }
        .nav-link {
            color: rgba(255,255,255,0.65); padding: 16px 28px; cursor: pointer;
            border-left: 4px solid transparent; font-weight: 500; transition: all 0.2s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.08); color: white; }
        .nav-link.active {
            background: rgba(99, 102, 241, 0.15); color: white;
            border-left-color: var(--primary-purple);
        }

        .main-content { margin-left: 260px; padding: 40px; min-height: 100vh; }

        /* 卡片与容器精修 */
        .stat-card {
            background: white; padding: 25px; border-radius: 20px;
            border: 1px solid rgba(99, 102, 241, 0.08);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }
        .stat-card h2 { color: var(--deep-purple); font-weight: 800; margin-top: 8px; }

        .chart-box {
            height: 350px; background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        .table-container {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }

        /* 按钮与标签自定义 */
        .btn-primary { background-color: var(--primary-purple); border: none; padding: 10px 20px; border-radius: 8px; }
        .btn-primary:hover { background-color: var(--accent-purple); transform: translateY(-1px); }
        .badge.bg-purple-soft { background-color: #eef2ff; color: var(--primary-purple); border: 1px solid #c7d2fe; }

        /* JSON 预览区 */
        pre#json-viewer {
            background: #0f172a; color: #38bdf8; padding: 24px;
            border-radius: 12px; font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px; max-height: 500px; overflow-y: auto; line-height: 1.6;
        }

        /* 打印适配 - 替换原有的 @media print */
        @media print {
            canvas { display: block !important; width: 100% !important; height: 100% !important; }
            #sidebar, .btn, .modal, hr { display: none !important; }

            /* 彻底隐藏操作列（包含表头 th 和内容 td） */
            .operation-column {
                display: none !important;
                width: 0 !important;
                visibility: hidden !important;
            }

            .main-content { margin-left: 0 !important; padding: 0 !important; width: 100% !important; }
            .chart-box { height: 320px !important; width: 100% !important; page-break-inside: avoid !important; margin-bottom: 20px !important; border: 1px solid #eee !important; }

            /* 表格打印优化 */
            .table { width: 100% !important; color: #000 !important; }
            .table td, .table th { border: 1px solid #ddd !important; color: #000 !important; }

            /* 状态显示强化：去掉背景色，改用加粗文字 */
            .badge { border: none !important; padding: 0 !important; font-weight: bold !important; background: transparent !important; }
            .bg-success { color: #059669 !important; } /* 绿色文字 */
            .bg-danger { color: #dc2626 !important; }  /* 红色文字 */
        }
    </style>
</head>
<body>

<!-- 侧边栏导航 -->
<div id="sidebar">
    <h3 class="px-4 mb-5 fw-bold text-center"><span style="color:var(--primary-purple)">Trace</span>Guard</h3>
    <nav class="nav flex-column">
        <a class="nav-link active" onclick="switchTab('dashboard')">🏠 运行仪表盘</a>
        <a class="nav-link" onclick="switchTab('upload')">🚀 证据可信采集</a>
        <a class="nav-link" onclick="switchTab('search')">🔍 链式审计查询</a>
        <a class="nav-link" onclick="triggerDetect()">🛡️ 批量自动检测</a>
        <hr class="mx-3 opacity-10">
        <a class="nav-link" onclick="exportReport()">📄 审计报告导出</a>
    </nav>
</div>

<div class="main-content">
    <!-- 1. 仪表盘部分 -->
    <div id="dashboard-section" class="tab-content">
        <h4 class="mb-4 fw-bold">可信的DDos攻击检测与证据溯源系统</h4>
        <div class="row g-4 mb-4">
            <div class="col-md-3"><div class="stat-card">总审计次数<h2 id="statTotal">0</h2></div></div>
            <div class="col-md-3"><div class="stat-card">有效记录<h2 class="text-success" id="statActive">0</h2></div></div>
            <div class="col-md-3"><div class="stat-card">已撤销证据<h2 class="text-danger" id="statInvalid">0</h2></div></div>
            <div class="col-md-3"><div class="stat-card">账本区块高度<h2 id="blockHeight">0</h2></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-8"><div id="trendChart" class="chart-box"></div></div>
            <div class="col-md-4"><div id="distChart" class="chart-box"></div></div>
        </div>

        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0">实时链上存证台账</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="fetchData()">刷新数据</button>
            </div>
            <table class="table table-hover align-middle">
                <thead>
                <tr class="text-secondary small"><th>时间</th><th>模型</th><th>置信度</th><th>状态</th><th class="operation-column text-end">治理操作</th></tr>
                </thead>
                <tbody id="auditTable"></tbody>
            </table>
        </div>
    </div>

    <!-- 2. 手动采集部分 -->
    <div id="upload-section" class="tab-content" style="display:none;">
        <h2 class="mb-4 fw-bold">证据手动可信上报</h2>
        <div class="card p-5 shadow-sm border-0" style="max-width: 700px; border-radius: 20px;">
            <div class="mb-4">
                <label class="form-label fw-bold">攻击者 IP 地址</label>
                <input type="text" id="addIp" class="form-control form-control-lg" placeholder="例如: 192.168.1.105">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">判定置信度 (%)</label>
                <input type="range" class="form-range" id="addConf" min="0" max="100" value="95" oninput="this.nextElementSibling.value = this.value">
                <output class="fw-bold text-primary fs-4">95</output>%
            </div>
            <button class="btn btn-primary btn-lg w-100 shadow" onclick="handleAdd()">🚀 执行共识上链</button>
        </div>
    </div>

    <!-- 3. 智能搜索部分 -->
    <div id="search-section" class="tab-content" style="display:none;">
        <h2 class="mb-4 fw-bold">智能多维溯源</h2>
        <div class="card p-4 shadow-sm border-0 mb-4" style="border-radius: 20px;">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">精确 IP</label>
                    <input id="qIp" class="form-control" placeholder="192.168.x.x">
                </div>
                <div class="col-md-3">
                    <label class="form-label">最低置信度</label>
                    <input type="number" id="qMinConf" class="form-control" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label">模型版本</label>
                    <select id="qVer" class="form-select">
                        <option value="">全部分类</option>
                        <option value="Web-Portal">Web-Portal (手动上报)</option> <!-- 新增这一行 -->
                        <option value="CNN-V2.0">CNN-V2.0</option>
                        <option value="BERT-V1.0">BERT-V1.0</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="handleAdvancedSearch()">🔍 检索</button>
                </div>
            </div>
        </div>
        <div id="searchResultArea" class="table-container" style="display:none;">
            <table class="table align-middle">
                <thead class="table-light"><tr><th>ID</th><th>模型</th><th>置信度</th><th>存证时间</th><th>状态</th><th class="text-end">操作</th></tr></thead>
                <tbody id="resultTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 详情审计弹窗 (JSON 浏览器) -->
<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px; overflow: hidden;">
            <div class="modal-header bg-dark text-white p-4">
                <h5 class="modal-title">📑 链下审计原件追踪 (JSON)</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <pre id="json-viewer">正在检索加密存储的审计特征...</pre>
            </div>
            <div class="modal-footer bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" onclick="copyJson()">复制 JSON 数据</button>
            </div>
        </div>
    </div>
</div>

<script>
    const lineChart = echarts.init(document.getElementById('trendChart'));
    const pieChart = echarts.init(document.getElementById('distChart'));

    // 1. 导航切换逻辑
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId + '-section').style.display = 'block';
        event.currentTarget.classList.add('active');
        if(tabId === 'dashboard') fetchData();
        setTimeout(() => { lineChart.resize(); pieChart.resize(); }, 150);
    }

    // 2. 数据拉取与渲染
    async function fetchData() {
        try {
            const statsRes = await fetch('/api/stats');
            const stats = await statsRes.json();

            document.getElementById('statTotal').innerText = stats.total || 0;
            document.getElementById('statActive').innerText = stats.active || 0;
            document.getElementById('statInvalid').innerText = stats.invalid || 0;
            document.getElementById('blockHeight').innerText = stats.blockHeight || '0';

            // 图表渲染
            lineChart.setOption({
                color: ['#6366f1'],
                xAxis: { type: 'category', data: Object.keys(stats.trend || {}) },
                yAxis: { type: 'value' },
                series: [{ data: Object.values(stats.trend || {}), type: 'line', smooth: true, areaStyle: { color: 'rgba(99, 102, 241, 0.1)' } }]
            });

            pieChart.setOption({
                color: ['#818cf8', '#f87171'],
                series: [{ type: 'pie', radius: ['50%', '80%'], data: [{name:'有效',value:stats.active},{name:'撤销',value:stats.invalid}] }]
            });

            const listRes = await fetch('/api/list');
            const list = await listRes.json();
            const tbody = document.getElementById('auditTable');

            tbody.innerHTML = list.reverse().slice(0, 10).map(i => {
                const model = i.modelVersion || "CNN-V2.0";
                const status = i.status || "Active";
                const statusClass = status === 'Active' ? 'bg-success' : 'bg-danger';

                return `
                    <tr>
                        <td>${new Date(parseInt(i.timestamp)).toLocaleString()}</td>
                        <td><span class="badge bg-purple-soft">${model}</span></td>
                        <td><b>${i.confidence}%</b></td>
                        <td><span class="badge ${statusClass}">${status}</span></td>
                        <td class="text-end operation-column">
                            <button class="btn btn-sm btn-link text-primary" onclick="showJsonDetail('${i.evidenceHash}')">审计原件</button>
                            ${status === 'Active' ? `
                                <button class="btn btn-sm btn-outline-primary ms-2" onclick="handleUpdate(${i.id})">修正</button>
                                <button class="btn btn-sm btn-outline-danger ms-1" onclick="revoke(${i.id})">撤销</button>
                            ` : '<small class="text-muted ms-2">已归档</small>'}
                        </td>
                    </tr>`;
            }).join('');
        } catch (e) { console.error(e); }
    }

    // 3. JSON 详情查看
    async function showJsonDetail(hash) {
        const modal = new bootstrap.Modal(document.getElementById('detailModal'));
        const viewer = document.getElementById('json-viewer');
        viewer.innerText = "🔍 正在从链下分布式节点读取审计特征原始报文...";
        modal.show();

        try {
            const res = await fetch(`/api/details?hash=${hash}`);
            if(res.status === 404) {
                viewer.innerText = "❌ 警告：该证据的本地原始 JSON 副本不存在或已被移动。请检查存储目录。";
                return;
            }
            const data = await res.json();
            viewer.innerText = JSON.stringify(data, null, 4);
        } catch (e) {
            viewer.innerText = "❌ 异常：无法连接后端 API 审计接口。";
        }
    }

    // 4. 其余核心治理功能 (全部保留)
    async function handleAdd() {
        const ip = document.getElementById('addIp').value;
        const conf = document.getElementById('addConf').value;
        if(!ip) return alert("请输入采集目标 IP 地址");
        await fetch(`/api/add?ip=${ip}&confidence=${conf}`);
        alert("✅ 上链存证请求已广播"); switchTab('dashboard');
    }

    async function handleUpdate(id) {
        const newVal = prompt("请输入修正后的置信度 (0-100):");
        if(newVal !== null) {
            await fetch(`/api/update?id=${id}&confidence=${newVal}`);
            fetchData();
        }
    }

    async function revoke(id) {
        if(confirm("确定撤销此审计记录吗？操作将被记录在案。")) {
            await fetch(`/api/revoke?id=${id}`);
            fetchData();
        }
    }

    async function triggerDetect() {
        const num = prompt("请输入自动化检测行数:", "100");
        if(num) {
            fetch('/api/detect?count=' + num);
            alert("🚀 审计引擎已启动，正在执行大规模检测，请稍后刷新。");
            setTimeout(fetchData, 5000);
        }
    }

    async function handleAdvancedSearch() {
        const ip = document.getElementById('qIp').value;
        const minConf = document.getElementById('qMinConf').value;
        const ver = document.getElementById('qVer').value;
        let url = `/api/query?minConf=${minConf}&version=${ver}`;
        if(ip) url += `&ip=${ip}`;

        const res = await (await fetch(url)).json();
        const area = document.getElementById('searchResultArea');
        area.style.display = 'block';
        document.getElementById('resultTbody').innerHTML = res.map(i => `
            <tr>
                <td>#${i.id}</td>
                <td>${i.modelVersion}</td>
                <td><b>${i.confidence}%</b></td>
                <td>${new Date(parseInt(i.timestamp)).toLocaleString()}</td>
                <td><span class="badge bg-success">${i.status}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-primary" onclick="showJsonDetail('${i.evidenceHash}')">查看 JSON</button>
                </td>
            </tr>
        `).join('');
    }

    // 替换原有的 exportReport 函数
    async function exportReport() {
        const tbody = document.getElementById('auditTable');
        // 1. 备份当前显示的 10 条数据
        const originalHTML = tbody.innerHTML;

        try {
            // 2. 获取全量审计列表
            const res = await fetch('/api/list');
            const allList = await res.json();

            // 3. 渲染全量数据到表格（不使用 .slice(0, 10)）
            tbody.innerHTML = allList.reverse().map(i => {
                const model = i.modelVersion || "CNN-V2.0";
                const status = i.status || "Active";
                // 打印时文字化状态
                const statusText = status === 'Active' ? '【有效】' : '【已撤销】';
                const statusClass = status === 'Active' ? 'bg-success' : 'bg-danger';

                return `
                    <tr>
                        <td>${new Date(parseInt(i.timestamp)).toLocaleString()}</td>
                        <td>${model}</td>
                        <td>${i.confidence}%</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td class="operation-column"></td>
                    </tr>`;
            }).join('');

            // 4. 触发打印（延迟一小会儿确保渲染完成）
            setTimeout(() => {
                window.print();
                // 5. 打印完成后，恢复回原来的 10 条显示界面
                tbody.innerHTML = originalHTML;
            }, 500);

        } catch (e) {
            alert("导出失败，无法获取全量审计数据");
            console.error(e);
        }
    }
    function copyJson() {
        const text = document.getElementById('json-viewer').innerText;
        navigator.clipboard.writeText(text).then(() => alert("审计数据已复制"));
    }

    window.onload = fetchData;
    setInterval(fetchData, 10000);
</script>
</body>
</html>
